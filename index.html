<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkian Kata — Jelajah Kosakata</title>
<style>
/* Minimal CSS for clarity */
body { font-family: sans-serif; padding: 2rem; background:#faf7f2; }
textarea { width:100%; min-height:100px; margin-bottom:1rem; }
button { margin-right:0.5rem; padding:0.5rem 1rem; }
.word-tile { display:inline-block; margin:2px; padding:2px 6px; background:#fff; border-radius:4px; border:1px solid #ccc; }
.hl-depan { background:#d3e6df; font-weight:600; }
.hl-belakang { background:#eee3d3; font-weight:600; }
.hl-semua { background:#e2d9ed; font-weight:600; }
.stat-item { cursor:pointer; margin-right:6px; display:inline-block; }
.stat-item.sorted-asc::after { content:" ↑"; font-weight:bold; }
.stat-item.sorted-desc::after { content:" ↓"; font-weight:bold; }
</style>
</head>
<body>

<textarea id="keywords">a, b</textarea>
<div>
  <button id="btn-depan">Berawalan</button>
  <button id="btn-belakang">Berakhiran</button>
  <button id="btn-semua">Mengandung</button>
</div>

<div id="stats-bar" style="margin:1rem 0;"></div>
<div id="results-box"></div>

<script>
(async function() {
  const DICT_URL = 'https://raw.githubusercontent.com/savemeours/savemeours.github.io/refs/heads/main/kamus.txt';
  let dictionary = [];
  let sortDirections = {}; // global sort per keyword
  let originalGroups = {}; // preserve original unsorted groups

  async function loadDictionary() {
    const resp = await fetch(DICT_URL);
    const text = await resp.text();
    dictionary = text.split('\n').map(w=>w.trim().toLowerCase()).filter(Boolean);
    console.log('Dictionary loaded', dictionary.length);
  }

  function getKeywords() {
    return document.getElementById('keywords').value.split(/[,\n]+/)
              .map(k=>k.trim().toLowerCase()).filter(Boolean);
  }

  function highlightWord(word, query, mode) {
    let idx = -1;
    if(mode==='depan') idx=word.startsWith(query)?0:-1;
    else if(mode==='belakang') idx=word.endsWith(query)?word.length-query.length:-1;
    else idx=word.indexOf(query);
    if(idx===-1) return word;
    return word.slice(0,idx)+'<span class="hl-'+mode+'">'+word.slice(idx,idx+query.length)+'</span>'+word.slice(idx+query.length);
  }

  function renderResults(groups, mode) {
    const statsBar = document.getElementById('stats-bar');
    const box = document.getElementById('results-box');
    statsBar.innerHTML=''; box.innerHTML='';

    Object.keys(groups).forEach(kw=>{
      const chip = document.createElement('span');
      chip.className='stat-item';
      if(sortDirections[kw]==='asc') chip.classList.add('sorted-asc');
      else if(sortDirections[kw]==='desc') chip.classList.add('sorted-desc');
      chip.innerHTML=`“${kw}” <strong>${groups[kw].length}</strong>`;

      chip.addEventListener('click',()=>{
        const current = sortDirections[kw];
        let newDir = !current?'asc':current==='asc'?'desc':undefined;
        sortDirections[kw]=newDir;

        if(newDir==='asc') groups[kw]=[...groups[kw]].sort((a,b)=>a.localeCompare(b));
        else if(newDir==='desc') groups[kw]=[...groups[kw]].sort((a,b)=>b.localeCompare(a));
        else groups[kw]=[...originalGroups[kw]];

        renderResults(groups,mode);
      });

      statsBar.appendChild(chip);

      // render words
      const titleDiv = document.createElement('div');
      titleDiv.innerHTML=`<strong>${kw} (${groups[kw].length})</strong>`;
      box.appendChild(titleDiv);

      const cloud = document.createElement('div');
      groups[kw].forEach(w=>{
        const span = document.createElement('span');
        span.className='word-tile';
        span.innerHTML=highlightWord(w,kw,mode);
        cloud.appendChild(span);
      });
      box.appendChild(cloud);
    });
  }

  function performSearch(mode) {
    const keywords = getKeywords();
    if(!keywords.length){ alert('Masukkan kata kunci'); return; }
    const groups={};
    keywords.forEach(kw=>{
      if(mode==='depan') groups[kw]=dictionary.filter(w=>w.startsWith(kw));
      else if(mode==='belakang') groups[kw]=dictionary.filter(w=>w.endsWith(kw));
      else groups[kw]=dictionary.filter(w=>w.includes(kw));
    });

    // store original for reset
    originalGroups={};
    Object.keys(groups).forEach(k=>originalGroups[k]=[...groups[k]]);
    // reset sort directions if new search
    keywords.forEach(k=>{if(!sortDirections[k]) sortDirections[k]=undefined;});

    renderResults(groups,mode);
  }

  document.getElementById('btn-depan').addEventListener('click',()=>performSearch('depan'));
  document.getElementById('btn-belakang').addEventListener('click',()=>performSearch('belakang'));
  document.getElementById('btn-semua').addEventListener('click',()=>performSearch('semua'));

  await loadDictionary();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kamus AI Modern</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0b0f1a;
  color: #e5e7eb;
}
.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}
.gradient {
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
}
.card-hover:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
</style>
</head>

<body class="p-6">

<div class="max-w-6xl mx-auto space-y-6">

<!-- HEADER -->
<div class="flex justify-between items-center">
  <h1 class="text-3xl font-bold tracking-tight">🔍 Kamus AI</h1>
  <div class="text-sm text-gray-400" id="count">0 kata</div>
</div>

<!-- SEARCH BAR -->
<div class="glass rounded-2xl p-4 flex gap-3 items-center">
  <input id="input" placeholder="Cari kata... (pisahkan koma)"
    class="flex-1 bg-transparent outline-none text-lg" />
  <button id="search" class="gradient px-5 py-2 rounded-xl font-semibold">Cari</button>
</div>

<!-- MODE SELECT -->
<div class="flex gap-3">
  <button data-mode="prefix" class="mode px-4 py-2 rounded-xl glass">Awalan</button>
  <button data-mode="suffix" class="mode px-4 py-2 rounded-xl glass">Akhiran</button>
  <button data-mode="contains" class="mode px-4 py-2 rounded-xl gradient">Mengandung</button>
</div>

<!-- RESULTS -->
<div id="results" class="grid md:grid-cols-2 gap-4"></div>

</div>

<script>
const URL = "https://raw.githubusercontent.com/savemeours/savemeours.github.io/refs/heads/main/kamus.txt";
let words = [];
let mode = 'contains';

async function load() {
  const res = await fetch(URL);
  const text = await res.text();
  words = [...new Set(text.split('\n').map(v => v.trim().toLowerCase()).filter(Boolean))];
  document.getElementById('count').innerText = words.length + " kata";
}

function searchWords(keys) {
  return keys.map(k => {
    let res;
    if (mode === 'prefix') res = words.filter(w => w.startsWith(k));
    else if (mode === 'suffix') res = words.filter(w => w.endsWith(k));
    else res = words.filter(w => w.includes(k));
    return { key: k, words: res };
  });
}

function render(data) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  data.forEach(group => {
    const div = document.createElement('div');
    div.className = "glass rounded-xl p-4 card-hover";

    div.innerHTML = `
      <div class="flex justify-between mb-3">
        <b>${group.key}</b>
        <span class="text-xs text-gray-400">${group.words.length}</span>
      </div>
      <div class="flex flex-wrap gap-2">
        ${group.words.slice(0,200).map(w => `<span class='px-3 py-1 bg-white/5 rounded-full text-sm'>${w}</span>`).join('')}
      </div>
    `;

    container.appendChild(div);
  });
}

// EVENTS

document.getElementById('search').onclick = () => {
  const keys = document.getElementById('input').value
    .split(/[,\n]/)
    .map(v => v.trim())
    .filter(Boolean);

  if (!keys.length) return alert('isi dulu');

  const result = searchWords(keys);
  render(result);
};


document.querySelectorAll('.mode').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode').forEach(b => b.classList.remove('gradient'));
    btn.classList.add('gradient');
    mode = btn.dataset.mode;
  };
});

load();
</script>

</body>
</html>

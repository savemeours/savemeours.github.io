<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Cari Kata — Kamus Indonesia</title><style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap'); *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --bg: #050810; --surface: #0d1117; --surface2: #161b27; --border: rgba(255,255,255,0.07); --accent1: #7c3aed; --accent2: #06b6d4; --text: #e2e8f0; --muted: #64748b; --glow1: rgba(124,58,237,0.35); --glow2: rgba(6,182,212,0.25); } html { scroll-behavior: smooth; } body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; } .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; } .orb { position: absolute; border-radius: 50%; filter: blur(120px); animation: drift 12s ease-in-out infinite alternate; } .orb1 { width: 600px; height: 600px; top: -200px; left: -150px; background: var(--glow1); } .orb2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: var(--glow2); animation-delay: -6s; } .orb3 { width: 300px; height: 300px; top: 40%; left: 60%; background: rgba(245,158,11,0.1); animation-delay: -3s; } @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.08); } } .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 60px 24px 80px; } header { text-align: center; margin-bottom: 52px; } .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border-radius: 999px; margin-bottom: 20px; } .badge-dot { width: 6px; height: 6px; background: #a78bfa; border-radius: 50%; animation: pulse 2s ease-in-out infinite; } @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} } h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.4rem, 6vw, 3.8rem); font-weight: 800; line-height: 1.1; background: linear-gradient(135deg, #fff 0%, #a78bfa 45%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 14px; } .subtitle { color: var(--muted); font-size: 15px; max-width: 460px; margin: 0 auto; line-height: 1.6; } .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset; margin-bottom: 24px; } .input-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; } .input-label::before { content: ''; width: 16px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, var(--accent1), var(--accent2)); } textarea { width: 100%; min-height: 90px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 16px 18px; resize: vertical; outline: none; transition: border-color .25s, box-shadow .25s; line-height: 1.7; } textarea::placeholder { color: #2d3748; } textarea:focus { border-color: rgba(124,58,237,0.5); box-shadow: 0 0 0 3px rgba(124,58,237,0.12); } .input-hint { font-size: 12px; color: #374151; margin-top: 8px; } .loading-bar { display: none; width: 100%; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 16px; } .loading-bar.active { display: block; } .loading-bar::after { content: ''; display: block; width: 40%; height: 100%; background: linear-gradient(90deg, var(--accent1), var(--accent2)); animation: slide 1s ease-in-out infinite; border-radius: 2px; } @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} } .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 24px; } @media (max-width: 600px) { .btn-row { grid-template-columns: 1fr; } } .btn { position: relative; overflow: hidden; border: none; border-radius: 12px; padding: 15px 16px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform .15s, box-shadow .2s; display: flex; align-items: center; justify-content: center; gap: 7px; letter-spacing: .2px; } .btn:hover { transform: translateY(-2px); } .btn:active { transform: scale(.98); } .btn-depan { background: linear-gradient(135deg, #059669, #047857); color: #fff; box-shadow: 0 8px 24px rgba(5,150,105,0.4); } .btn-belakang { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; box-shadow: 0 8px 24px rgba(124,58,237,0.4); } .btn-semua { background: linear-gradient(135deg, #0891b2, #0e7490); color: #fff; box-shadow: 0 8px 24px rgba(6,182,212,0.35); } .btn:disabled { opacity: .4; pointer-events: none; } #results-section { display: none; } .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; } .results-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; } .results-meta { font-size: 12px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; } .results-meta .count { color: #a78bfa; font-weight: 700; } .stats-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; } .stat-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 500; color: var(--muted); } .stat-chip .val { color: var(--text); font-weight: 700; } .results-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; max-height: 460px; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: #1e293b transparent; } .results-box::-webkit-scrollbar { width: 5px; } .results-box::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; } .group-block { margin-bottom: 12px; } .group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #a78bfa; margin-bottom: 8px; padding: 0 8px; display: flex; align-items: center; gap: 8px; } .group-label::after { content: ''; flex: 1; height: 1px; background: rgba(124,58,237,0.15); } .group-count { color: var(--muted); font-weight: 500; font-size: 10px; } .word-grid { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; } .word-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 500; transition: background .15s, border-color .15s, transform .1s; cursor: default; } .word-chip:hover { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.35); transform: translateY(-1px); } .hl-depan { color: #34d399; font-weight: 700; } .hl-belakang { color: #22d3ee; font-weight: 700; } .hl-semua { color: #a78bfa; font-weight: 700; } .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); } .empty-state .emoji { font-size: 40px; margin-bottom: 12px; } .empty-state p { font-size: 14px; } #dict-loading { text-align: center; padding: 20px 0; color: var(--muted); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; } .spin { width: 16px; height: 16px; border: 2px solid rgba(124,58,237,0.3); border-top-color: #a78bfa; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; } @keyframes spin { to { transform: rotate(360deg); } } footer { text-align: center; padding-top: 40px; font-size: 12px; color: #1f2937; } </style></head><body><div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div><div class="container"><header><div class="badge"><span class="badge-dot"></span>Kamus Indonesia</div><h1>Pencari Kata</h1><p class="subtitle">Cari kata dari depan, dari belakang, atau temukan semua kata yang mengandung polamu.</p></header><div class="card"><div id="dict-loading"><div class="spin"></div>Memuat kamus…</div><div id="form-area" style="display:none"><div class="input-label">Kata pencarian</div><textarea id="keywords" placeholder="Contoh: makan, tidur, buku&#10;Pisahkan dengan koma atau baris baru"></textarea><div class="input-hint">💡 Bisa masukkan beberapa kata sekaligus, pisahkan dengan koma</div><div class="loading-bar" id="loading-bar"></div><div class="btn-row"><button class="btn btn-depan" id="btn-depan">↪ Cari dari Depan</button><button class="btn btn-belakang" id="btn-belakang">↩ Cari dari Belakang</button><button class="btn btn-semua" id="btn-semua">⬡ Cari Semua</button></div></div></div><div id="results-section" class="card"><div class="results-header"><div class="results-title" id="results-title">Hasil Pencarian</div><div class="results-meta">Ditemukan <span class="count" id="results-count">0</span> kata</div></div><div class="stats-bar" id="stats-bar"></div><div class="results-box" id="results-box"></div></div><footer>Cari Kata &mdash; <span id="dict-count">–</span> kata tersedia dalam kamus. By <b>DexterHUB</b></footer></div><script> const DICT_URL = 'https://raw.githubusercontent.com/DexterHUB99/Cari-Kata/refs/heads/main/kamus.txt'; let dictionary = []; async function loadDict() { try { const r = await fetch(DICT_URL); const txt = await r.text(); dictionary = txt.split('\n').map(w => w.trim().toLowerCase()).filter(Boolean); document.getElementById('dict-count').textContent = dictionary.length.toLocaleString('id'); document.getElementById('dict-loading').style.display = 'none'; document.getElementById('form-area').style.display = 'block'; } catch(e) { document.getElementById('dict-loading').innerHTML = '⚠️ Gagal memuat kamus.'; } } function getKeywords() { return document.getElementById('keywords').value.split(/[,\n]+/).map(k => k.trim().toLowerCase()).filter(Boolean); } function setLoading(on) { document.getElementById('loading-bar').classList.toggle('active', on); ['btn-depan','btn-belakang','btn-semua'].forEach(id => document.getElementById(id).disabled = on); } function hlWord(word, query, mode) { let idx; if (mode === 'depan') idx = word.startsWith(query) ? 0 : -1; else if (mode === 'belakang') idx = word.endsWith(query) ? word.length - query.length : -1; else idx = word.indexOf(query); if (idx === -1) return word; return word.slice(0, idx) + '<span class="hl-' + mode + '">' + word.slice(idx, idx + query.length) + '</span>' + word.slice(idx + query.length); } function renderResults(groups, mode) { const section = document.getElementById('results-section'); const box = document.getElementById('results-box'); const statsBar = document.getElementById('stats-bar'); const titles = { depan: 'Kata Berawalan…', belakang: 'Kata Berakhiran…', semua: 'Kata yang Mengandung…' }; document.getElementById('results-title').textContent = titles[mode]; let total = 0; statsBar.innerHTML = ''; Object.keys(groups).forEach(kw => { total += groups[kw].length; const c = document.createElement('div'); c.className = 'stat-chip'; c.innerHTML = '"' + kw + '" → <span class="val">' + groups[kw].length + '</span> kata'; statsBar.appendChild(c); }); document.getElementById('results-count').textContent = total.toLocaleString('id'); section.style.display = 'block'; if (total === 0) { box.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>Tidak ada kata yang cocok ditemukan.</p></div>'; section.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; } box.innerHTML = ''; Object.keys(groups).forEach(kw => { if (!groups[kw].length) return; const block = document.createElement('div'); block.className = 'group-block'; block.innerHTML = '<div class="group-label">"' + kw + '" <span class="group-count">' + groups[kw].length + ' kata</span></div>'; const grid = document.createElement('div'); grid.className = 'word-grid'; groups[kw].forEach(w => { const chip = document.createElement('div'); chip.className = 'word-chip'; chip.innerHTML = hlWord(w, kw, mode); grid.appendChild(chip); }); block.appendChild(grid); box.appendChild(block); }); section.scrollIntoView({ behavior: 'smooth', block: 'start' }); } function search(mode) { const kws = getKeywords(); if (!kws.length) { alert('Masukkan setidaknya satu kata!'); return; } setLoading(true); setTimeout(() => { const groups = {}; kws.forEach(kw => { if (mode === 'depan') groups[kw] = dictionary.filter(w => w.startsWith(kw)); else if (mode === 'belakang') groups[kw] = dictionary.filter(w => w.endsWith(kw)); else groups[kw] = dictionary.filter(w => w.includes(kw)); }); setLoading(false); renderResults(groups, mode); }, 60); } document.getElementById('btn-depan').addEventListener('click', () => search('depan')); document.getElementById('btn-belakang').addEventListener('click', () => search('belakang')); document.getElementById('btn-semua').addEventListener('click', () => search('semua')); loadDict(); </script></body></html>
